# Mapping from the rich genre to the legacy 8-value model PROGRAM_TYPES set
# (News, Drama, Comedy, Reality, Documentary, Sports, Promo, Other) for
# backward compatibility with tv_break_model.py. The rich genre is canonical;
# this collapse is only used where the legacy set is still required.
