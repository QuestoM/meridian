# Program category taxonomy for the Kairos program classifier.
#
# This file is the single source of truth for how an Israeli TV programme
# title is mapped to a genre (program_type). It is intentionally editable
# without touching code: add keywords or specific-programme overrides here
# and the classifier picks them up.
#
# Matching strategy (implemented in kairos/data/classifier.py):
#   1. specific_programs  - exact substring match, highest priority
#   2. categories         - weighted keyword scoring; longer keywords weigh more,
#                           ties broken by category order below (earlier wins)
#   3. fallback           - "Other" with low confidence (honest unknown)
#
# Hebrew is matched as-is. Latin keywords should be lowercase. Quote variants
# (" " ' gershayim) are normalised before matching, so write them naturally.
#
# Coverage is validated against the real Programmes.xlsx via
# scripts/validate_classifier.py, which writes output/classifier_coverage.md.
# When new uncovered titles appear, add them here and re-run the validator.

version: 2

# Markers that flag a rerun (שידור חוזר). Detected and reported as metadata;
# they do not change the genre. Stripped before keyword matching.
rerun_markers:
  - "ש.ח"
  - "ש\"ח"
  - "שידור חוזר"

# Categories in PRIORITY order (earlier category wins a score tie).
